<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
  </head>
  <body class="bg-dark overflow-hidden cursor-pointer m-0 p-0">

    <div class="container-fluid vh-100 position-relative p-0 text-light text-center">

    <img src="assets/top-frame.png"
    id="topFrame"
    class="position-absolute top-0 start-50 w-100 pe-none"
    style="z-index:5;">

    <img src="assets/bottom-frame.png"
    id="bottomFrame"
    class="position-absolute bottom-0 start-50 w-100 pe-none"
    style="z-index:5;">

    <img src="assets/lantern.png"
    id="lanternLeft"
    class="position-absolute top-0 start-0 mt-6 ms-6 pe-none"
    style="transform-origin: top center; z-index:5;"
    width="300">

    <img src="assets/lantern.png"
    id="lanternRight"
    class="position-absolute top-0 end-0 mt-6 ms-6 pe-none"
    style="transform-origin: top center; z-index:5;"
    width="300">

    <img src="assets/lantern.png"
    id="lanternLeftSmall"
    class="position-absolute top-0 start-0 pe-none"
    style="transform-origin: top center; margin-left: 220px; margin-top: 180px; z-index:1;"
    width="210">

    <img src="assets/lantern.png"
    id="lanternRightSmall"
    class="position-absolute top-0 end-0 pe-none"
    style="transform-origin: top center; margin-right: 220px; margin-top: 180px; z-index:1;"
    width="210">

<div id="ramadanText"
    class="position-absolute top-50 start-50 translate-middle text-center text-light">

    <i id="successIcon" class="bi bi-check-circle-fill text-success d-block mx-auto mb-3 opacity-0 d-none" style="font-size:4rem;"></i>

    <h1 id="title1" class="display-1 fw-bold opacity-0">
        RAMADHAN
    </h1>

    <h1 id="title2" class="display-1 fw-bold opacity-0">
        MUBARAK
    </h1>

    <p id="subtitle" class="lead opacity-0">
        klik dimana saja untuk klaim THR
    </p>

</div>

<div id="thrCardPopup"
    class="position-absolute top-50 start-50 translate-middle opacity-0 pe-none"
    style="z-index:30; transition: opacity 0.35s ease;">
  <div id="thrCard"
      class="card bg-success p-2 text-white rounded shadow-sm border-0"
      style="width:500px; height:254px; cursor:pointer; transform:scale(0.7); transition:transform 0.45s ease;">

    <div class="card-body d-flex flex-column justify-content-end gap-2">

      <h5 class="card-title fw-bold text-capitalize">
        THR Claimed!
      </h5>

      <p class="card-text small mb-0">
        Selamat, anda telah berhasil mengklaim THR.
      </p>

    </div>

  </div>
</div>

</div>

</body>
  
</html>
